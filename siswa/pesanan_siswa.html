<!DOCTYPE html>
<html lang="id">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pesanan Saya – SobatPelajar</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <link rel="stylesheet" href="../css/siswa/siswa_style.css" />
</head>

<body>
  <div class="overlay" id="overlay"></div>

  <div class="layout">
    <!-- SIDEBAR -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-brand">
        <div class="nama">Sobat<span>Pelajar</span></div>
        <div class="peran">Pesanan Saya</div>
      </div>

      <nav class="sidebar-menu">
        <div class="menu-label">Menu Utama</div>
        <a href="dashboard-siswa-updated.html" class="menu-item"><i class="fa fa-th-large"></i>Ringkasan</a>
        <a href="cari_tutor.html" class="menu-item"><i class="fa fa-search"></i>Cari Tutor</a>
        <a href="pesanan_siswa.html" class="menu-item aktif"><i class="fa-solid fa-bag-shopping"></i>Pesanan Saya</a>
        <a href="jadwal_siswa.html" class="menu-item"><i class="fa fa-calendar"></i>Jadwal Saya</a>
        <a href="materi_siswa.html" class="menu-item"><i class="fa fa-book"></i>Materi Saya</a>

        <div class="menu-label" style="margin-top:8px;">Akun</div>
        <a href="profil_siswa.html" class="menu-item"><i class="fa fa-user-circle"></i>Profil</a>
      </nav>

      <div class="sidebar-bawah">
        <div class="info-user">
          <div id="sideAvatar" class="avatar-user">R</div>
          <div>
            <div id="sideNama" class="nama-user">Rizky Aditya</div>
            <div id="sideEmail" class="email-user">rizky@email.com</div>
          </div>
        </div>
        <a href="../login.html" class="btn-keluar"><i class="fa fa-sign-out-alt me-1"></i>Keluar</a>
      </div>
    </aside>

    <!-- KONTEN UTAMA -->
    <main class="main-content">
      <div class="topbar">
        <div class="d-flex align-items-center">
          <button class="btn-hamburger me-3 d-lg-none" id="btnMenu"><i class="fa fa-bars"></i></button>
          <div>
            <div class="judul-halaman">Pesanan Saya</div>
            <div class="sub-judul-halaman">Kelola permintaan les yang kamu ajukan</div>
          </div>
        </div>
        <div class="topbar-kanan d-flex align-items-center gap-3">
          <div class="position-relative">
            <span class="badge bg-warning text-dark p-2 px-3 rounded-pill" style="font-weight: 500;">
              <i class="fa fa-clock me-1"></i> <span id="countMenunggu">3</span> Pesanan Menunggu
            </span>
          </div>
        </div>
      </div>

      <div class="area-halaman">

        <!-- STATISTIK -->
        <div class="row g-3 mb-4">
          <div class="col-md-8">
            <div class="card p-3 h-100 border-0 shadow-sm">
              <div class="d-flex flex-wrap gap-2" id="filterContainer">
                <button onclick="filterPesanan('Semua', this)" class="btn btn-primary btn-sm rounded-pill px-3 active">Semua</button>
                <button onclick="filterPesanan('Menunggu', this)" class="btn btn-outline-secondary btn-sm rounded-pill px-3">Menunggu</button>
                <button onclick="filterPesanan('Disetujui', this)" class="btn btn-outline-secondary btn-sm rounded-pill px-3">Disetujui</button>
                <button onclick="filterPesanan('Dibatalkan', this)" class="btn btn-outline-secondary btn-sm rounded-pill px-3">Dibatalkan</button>
              </div>
            </div>
          </div>
          <div class="col-md-4">
            <div class="card p-3 bg-primary text-white text-center h-100 border-0 shadow-sm">
              <small class="opacity-75">Total Pesanan Selesai</small>
              <div class="fw-bold fs-4" id="countSelesai">3 Sesi</div>
            </div>
          </div>
        </div>

        <!-- TABEL PESANAN -->
        <div class="card border-0 shadow-sm overflow-hidden">
          <div class="table-responsive">
            <table class="table table-hover align-middle mb-0">
              <thead>
                <tr style="background:var(--bg);font-size:.82rem;color:var(--abu);font-weight:700;text-transform:uppercase;">
                  <th class="ps-4 py-3">Tutor</th>
                  <th>Mata Pelajaran</th>
                  <th>Jadwal</th>
                  <th>Mode</th>
                  <th>Tarif</th>
                  <th>Status</th>
                  <th class="text-center">Aksi</th>
                </tr>
              </thead>
              <tbody id="tabelPesanan"></tbody>
            </table>
          </div>
        </div>

      </div>
    </main>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    const pesanan = [
      { id: 1, tutor: 'Budi Santoso, M.Pd', inisial: 'BS', warna: '#1565C0', mapel: 'Matematika', jadwal: 'Besok, 15:00', durasi: '90 Menit', mode: 'Online', harga: 55000, status: 'Menunggu' },
      { id: 2, tutor: 'Dewi Rahayu, S.Pd', inisial: 'DR', warna: '#7C3AED', mapel: 'Bahasa Inggris', jadwal: '22 Mar, 10:00', durasi: '60 Menit', mode: 'Tatap Muka', harga: 60000, status: 'Menunggu' },
      { id: 3, tutor: 'Ahmad Fauzi, M.Si', inisial: 'AF', warna: '#16A34A', mapel: 'Fisika', jadwal: '24 Mar, 13:00', durasi: '60 Menit', mode: 'Online', harga: 70000, status: 'Menunggu' },
      { id: 4, tutor: 'Budi Santoso, M.Pd', inisial: 'BS', warna: '#1565C0', mapel: 'Matematika', jadwal: '15 Mar, 15:00', durasi: '90 Menit', mode: 'Online', harga: 55000, status: 'Disetujui' },
      { id: 5, tutor: 'Sari Indah, S.Pd', inisial: 'SI', warna: '#FF6B2B', mapel: 'Kimia', jadwal: '10 Mar, 09:00', durasi: '60 Menit', mode: 'Tatap Muka', harga: 50000, status: 'Disetujui' },
      { id: 6, tutor: 'Dewi Rahayu, S.Pd', inisial: 'DR', warna: '#7C3AED', mapel: 'Bahasa Inggris', jadwal: '5 Mar, 14:00', durasi: '60 Menit', mode: 'Online', harga: 60000, status: 'Disetujui' },
      { id: 7, tutor: 'Rizal Pratama, M.Pd', inisial: 'RP', warna: '#0891B2', mapel: 'Matematika', jadwal: '1 Mar, 10:00', durasi: '60 Menit', mode: 'Online', harga: 45000, status: 'Dibatalkan' },
    ];

    const badgeMap = {
      'Menunggu':   { kelas: 'badge bg-warning text-dark', icon: 'fa-clock' },
      'Disetujui':  { kelas: 'badge bg-success text-white', icon: 'fa-check-circle' },
      'Dibatalkan': { kelas: 'badge bg-danger text-white', icon: 'fa-times-circle' },
    };

    let filterAktif = 'Semua';

    function renderPesanan(data) {
      const tbody = document.getElementById('tabelPesanan');
      if (data.length === 0) {
        tbody.innerHTML = `<tr><td colspan="7" class="text-center py-5">
          <i class="fa fa-inbox fa-2x text-muted mb-2 d-block"></i>
          <div style="font-weight:700;">Belum ada pesanan</div>
          <div style="color:var(--abu);font-size:.88rem;">Mulai cari tutor dan buat pesanan pertamamu</div>
        </td></tr>`;
        return;
      }
      tbody.innerHTML = data.map(p => {
        const badge = badgeMap[p.status];
        let aksi = '';
        if (p.status === 'Menunggu') {
          aksi = `<button class="btn-aksi text-danger bg-danger-subtle" title="Batalkan"><i class="fa fa-times"></i></button>`;
        } else if (p.status === 'Disetujui') {
          aksi = `<button class="btn-aksi text-success bg-success-subtle" title="Beri Ulasan"><i class="fa fa-star"></i></button>`;
        } else {
          aksi = `<span style="font-size:0.78rem;color:var(--abu);">—</span>`;
        }
        return `
          <tr>
            <td class="ps-4">
              <div class="d-flex align-items-center gap-2">
                <div style="width:36px;height:36px;border-radius:50%;background:${p.warna};color:white;font-weight:700;font-size:.85rem;display:flex;align-items:center;justify-content:center;flex-shrink:0;">${p.inisial}</div>
                <div>
                  <div class="fw-bold small">${p.tutor}</div>
                  <div class="extra-small text-muted">${p.durasi}</div>
                </div>
              </div>
            </td>
            <td><span class="badge badge-biru">${p.mapel}</span></td>
            <td><small class="text-muted"><i class="fa fa-calendar me-1"></i>${p.jadwal}</small></td>
            <td><small>${p.mode === 'Online' ? '<i class="fa fa-laptop me-1 text-primary"></i>' : '<i class="fa fa-map-marker me-1 text-success"></i>'}${p.mode}</small></td>
            <td><small class="fw-bold">Rp ${p.harga.toLocaleString('id-ID')}</small></td>
            <td><span class="${badge.kelas}" style="font-size:.75rem;"><i class="fa ${badge.icon} me-1"></i>${p.status}</span></td>
            <td class="text-center">${aksi}</td>
          </tr>`;
      }).join('');
    }

    function filterPesanan(status, el) {
      filterAktif = status;
      document.querySelectorAll('#filterContainer button').forEach(b => {
        b.classList.remove('btn-primary', 'active');
        b.classList.add('btn-outline-secondary');
      });
      el.classList.remove('btn-outline-secondary');
      el.classList.add('btn-primary', 'active');
      const hasil = status === 'Semua' ? pesanan : pesanan.filter(p => p.status === status);
      renderPesanan(hasil);
    }

    // Sidebar mobile
    document.getElementById('btnMenu').onclick = () => {
      document.getElementById('sidebar').classList.add('active');
      document.getElementById('overlay').classList.add('active');
    };
    document.getElementById('overlay').onclick = () => {
      document.getElementById('sidebar').classList.remove('active');
      document.getElementById('overlay').classList.remove('active');
    };

    renderPesanan(pesanan);
  </script>

  <style>
    .btn-aksi {
      border: none;
      border-radius: 8px;
      padding: 6px 10px;
      font-size: 0.8rem;
      cursor: pointer;
      transition: 0.2s;
    }
    .btn-aksi:hover { opacity: 0.85; transform: scale(1.05); }
    .extra-small { font-size: 0.72rem; }
    .main-content { flex: 1; margin-left: 240px; transition: 0.3s; }
    @media (max-width: 991px) { .main-content { margin-left: 0; } }
  </style>
</body>
</html>
